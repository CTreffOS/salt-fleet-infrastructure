[Interface]
Address = {{ address }}/32
PrivateKey = INJECT_PRIVATE_KEY_HERE

{% set peer_psk = salt['mine.get'](grains["id"], 'wireguard_vpn_server:' + instance_id + ':psk').get(grains["id"]) %} # TODO this should be read diretly from file

[Peer]
PublicKey = {{ peer_key }}
Endpoint = {{ peer_endpoint }}
{% if peer_psk %}PresharedKey = {{ peer_psk }}{% endif %}
AllowedIPs = {{ peer_ip }}/32
PersistentKeepalive = 60
