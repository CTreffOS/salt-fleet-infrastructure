{% for _, hosts in salt['mine.get']('knox.chaostreff-osnabrueck.de', 'mine_wireguard_hosts') | dictsort() %}
{% for server in hosts.split('\n') %}{% if server == grains["id"] and server in salt['mine.get'](server, 'mine_wireguard_pub') %}
[Interface]
Address = 10.13.37.{{ loop.index + 1 }}/32
PrivateKey = INJECT_PRIVATE_KEY_HERE

# knox.chaostreff-osnabrueck.de
[Peer]
PublicKey = {{ salt['mine.get']('*', 'mine_wireguard_pub').get('knox.chaostreff-osnabrueck.de') }}
Endpoint = salt-mass-vpn.chaostreff-osnabrueck.de:12753
{% if grains["id"] in salt['mine.get'](grains["id"], 'mine_wireguard_psk') -%}
PresharedKey = {{ salt['mine.get'](server, 'mine_wireguard_psk')[grains["id"]] }}
{%- endif %}
AllowedIPs = 10.13.37.1/32
PersistentKeepalive = 60
{% endif %}{% endfor %}{% endfor %}
